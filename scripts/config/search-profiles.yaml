      - junior ml engineer
      - ml engineer
      - machine learning engineer
      - applied scientist
      - analytics scientist
      - quantitative analyst
      - research scientist
      - ai engineer
      - ai researcher
      - nlp engineer
      - computer vision engineer
      - deep learning engineer
      - decision scientist
      - statistical analyst
      - modelling analyst
      - predictive analyst
      - data science intern
      - 데이터 사이언티스트
      - 데이터사이언티스트
      - 머신러닝
      - AI 엔지니어
    boost:
      - machine learning
      - python
      - scikit-learn
      - regression
      - classification
      - feature engineering
      - a/b test
      - statistical model
      - tensorflow
      - pytorch
      - nlp
      - deep learning

  DE:
    must_include:
      - data engineer
      - junior data engineer
      - graduate data engineer
      - associate data engineer
      - sql developer
      - junior sql developer
      - database developer
