# Job Search Pipeline — Search Profiles
# Defines role classification keywords + region targeting
# Used by:
#   - Adzuna/Saramin collectors (active query)
#   - filter/dedup script (post-collection role classification)
#
# IMPORTANT: Ina, edit this freely. Add/remove keywords as you discover
# what terms actually appear in JDs. Re-run filter to retest.

# ============================================================
# ROLES — keyword pools for classification
# ============================================================
# Lowercase comparison; partial match (substring); JD title + description.
# 'must_include': at least one of these = role match
# 'boost': if any present, increase confidence (used by filter)
# 'exclude': if any present, REJECT this JD entirely (seniority filter)

roles:
  DA:
    must_include:
      - data analyst
      - junior data analyst
      - graduate data analyst
      - associate data analyst
      - bi analyst
      - business analyst
      - business intelligence analyst
      - reporting analyst
      - insights analyst
      - analytics analyst
      - commercial analyst
      - operations analyst
      - marketing analyst
      - financial analyst
      - risk analyst
      - credit analyst
      - product analyst
      - strategy analyst
      - research analyst
      - pricing analyst
      - performance analyst
      - revenue analyst
      - digital analyst
      - cx analyst
      - customer analyst
      - supply chain analyst
      - fraud analyst
      - compliance analyst
      - workforce analyst
      - people analyst
      - hr analyst
      - analytics associate
      - data analytics
      - analytics intern
      - data intern
      - 데이터 분석
      - 데이터분석
      - 비즈니스 분석
      - 비즈니스분석
      - 리서치 분석
    boost:
      - sql
      - power bi
      - tableau
      - dashboard
      - kpi
      - reporting
      - excel
      - looker

  DS:
    must_include:
      - data scientist
