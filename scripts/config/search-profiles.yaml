      - database administrator
      - dba
      - data architect
      - dataops engineer
      - big data engineer
      - data engineer intern
      - 데이터 엔지니어
      - 데이터엔지니어
      - DB 엔지니어
      - SQL 개발
    boost:
      - sql
      - etl
