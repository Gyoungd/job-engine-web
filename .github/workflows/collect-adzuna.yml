name: Collect Adzuna API

on:
  schedule:
    # 1 run/day at 12am AEST (14:00 UTC)
    - cron: '0 14 * * *'
  workflow_dispatch:

concurrency:
  group: collect-adzuna
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/collection/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/collection/requirements.txt

      - name: Collect from Adzuna API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        working-directory: scripts/collection
        run: python 1_collect_adzuna.py --save-raw --push-supabase
