name: Collect Gmail Alerts

on:
  schedule:
    # 8 runs/day @ 2hr interval: 8am,10am,12pm,2pm,4pm,6pm,8pm,10pm AEST
    - cron: '0 22,0,2,4,6,8,10,12 * * *'
  workflow_dispatch:

concurrency:
  group: collect-gmail
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/collection/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/collection/requirements.txt

      - name: Restore Gmail credentials
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          mkdir -p .credentials
          echo "$GMAIL_CREDENTIALS_JSON" > .credentials/gmail-credentials.json
          echo "$GMAIL_TOKEN_JSON" > .credentials/gmail-token.json

      - name: Collect from Gmail alerts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_OAUTH_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        working-directory: scripts/collection
        run: python 1_collect_alerts.py --save-raw --push-supabase
